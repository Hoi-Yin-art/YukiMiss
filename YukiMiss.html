<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Yuki - 個人音樂頁面 (Cyberpunk Pink v2.0)</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700&family=Orbitron:wght@600;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary: #0a020b;
      --bg-secondary: #1a011a;
      --fg: #ffffff;
      --fg-muted: #ffb3d9;
      --accent: #ff007f;       /* 賽博霓虹粉 */
      --accent-cyan: #00f0ff;  /* 賽博亮藍 */
      --card-bg: rgba(20, 5, 20, 0.75);
      --border: rgba(255, 0, 127, 0.4);
      --player-bg: rgba(10, 2, 11, 0.95);
    }

    html {
      font-size: 16px;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      padding-bottom: 120px;
      font-family: 'Noto Sans TC', sans-serif;
      background-color: var(--bg-primary);
      color: var(--fg);
      overflow-x: hidden;
      position: relative;
    }

    /* 背景層：融合你的粉紅 Cyberpunk GIF */
    .bg-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .bg-gradient {
      position: absolute;
      inset: 0;
      /* 這裡替換成你的 GIF 檔名，例如 cyberpunk-girl.gif */
      background: 
        linear-gradient(135deg, rgba(10, 2, 11, 0.85) 0%, rgba(26, 1, 26, 0.7) 100%),
        url(你的粉紅Cyberpunk女孩動畫.gif) no-repeat center center;
      background-size: cover;
    }

    /* 賽博霓虹網格線與光暈 */
    .cyber-grid {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255, 0, 127, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 0, 127, 0.05) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    .floating-shape {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      animation: float 15s ease-in-out infinite;
    }

    .shape-1 { width: 400px; height: 400px; background: var(--accent); top: -100px; left: -100px; }
    .shape-2 { width: 300px; height: 300px; background: var(--accent-cyan); bottom: -50px; right: -50px; animation-delay: -5s; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(40px, -40px) scale(1.1); }
    }

    /* 科技感粒子 */
    .particles { position: absolute; inset: 0; overflow: hidden; }
    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--accent-cyan);
      border-radius: 50%;
      opacity: 0;
      animation: particle-rise 6s ease-in infinite;
    }

    @keyframes particle-rise {
      0% { opacity: 0; transform: translateY(100vh) scale(0); }
      20% { opacity: 0.8; }
      80% { opacity: 0.4; }
      100% { opacity: 0; transform: translateY(-10vh) scale(1.5); }
    }

    /* 賽博風格卡片 */
    .card {
      position: relative;
      z-index: 1;
      background: var(--card-bg);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 2px solid var(--accent);
      border-radius: 16px; /* 賽博龐克偏向俐落幾何，縮小圓角 */
      padding: 2.5rem 2rem;
      max-width: 350px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 25px rgba(255, 0, 127, 0.3), inset 0 0 15px rgba(255, 0, 127, 0.2);
      animation: card-entrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(30px);
      margin-bottom: 20px;
    }

    /* 模擬邊角裁切的科幻感 (右下角科技線條) */
    .card::after {
      content: "";
      position: absolute;
      bottom: 0;
      right: 0;
      width: 20px;
      height: 20px;
      background: var(--accent);
      clip-path: polygon(100% 0, 0 100%, 100% 100%);
    }

    @keyframes card-entrance { to { opacity: 1; transform: translateY(0); } }

    /* 頭像外圈（霓虹跑馬燈） */
    .avatar-wrapper {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto 1.5rem;
    }

    .avatar-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(var(--accent), var(--accent-cyan), var(--accent));
      animation: ring-rotate 4s linear infinite;
      box-shadow: 0 0 15px var(--accent);
      z-index: 0;
    }

    @keyframes ring-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .avatar {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #0a020b;
      z-index: 1;
    }

    /* 名字與簡介 */
    h1 {
      font-family: 'Orbitron', 'Noto Sans TC', sans-serif; /* 科技感字體 */
      font-size: 1.8rem;
      font-weight: 900;
      margin-bottom: 0.75rem;
      letter-spacing: 0.05em;
      color: #fff;
      text-shadow: 0 0 8px var(--accent), 0 0 20px rgba(255, 0, 127, 0.5);
    }

    .bio {
      color: var(--fg-muted);
      font-size: 0.9rem;
      font-weight: 500;
      line-height: 1.6;
      margin-bottom: 0.4rem;
      text-align: left;
      padding-left: 10px;
      border-left: 2px solid var(--accent-cyan);
    }

    /* 播放專區標題 */
    .audio-section-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem;
      color: var(--accent-cyan);
      margin: 1.8rem 0 0.75rem;
      text-align: left;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-shadow: 0 0 5px var(--accent-cyan);
    }

    /* 音軌清單 */
    .audio-tracks {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }

    .track-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 0, 127, 0.08);
      border: 1px solid rgba(255, 0, 127, 0.2);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: left;
    }
    .track-item:hover {
      background: rgba(0, 240, 255, 0.15);
      border-color: var(--accent-cyan);
      box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
      transform: translateX(4px);
    }
    .track-item.playing {
      background: rgba(255, 0, 127, 0.25);
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(255, 0, 127, 0.4);
    }
    .track-name {
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }
    .track-play-icon {
      color: var(--accent-cyan);
      font-size: 0.85rem;
    }
    .track-item.playing .track-play-icon {
      color: var(--accent);
    }

    /* 社交按鈕群（變更為 Cyber 霓虹流光） */
    .social-links {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 0.85rem 1.25rem;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.85rem;
      color: #fff;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--accent);
      background: rgba(20, 5, 20, 0.6);
      box-shadow: 0 0 8px rgba(255, 0, 127, 0.2);
    }

    /* 按鈕懸浮霓虹變色特效 */
    .btn:hover {
      transform: scale(1.02) translateX(4px);
      border-color: var(--accent-cyan);
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
      color: var(--accent-cyan);
    }
    .btn:active { transform: scale(0.98); }

    /* 頁尾 */
    .footer {
      margin-top: 25px;
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: #ffffff;
      opacity: 0.5;
    }

    /* ===== 底部全域音樂播放列 ===== */
    .audio-player-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--player-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-top: 2px solid var(--accent);
      padding: 15px 25px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 -5px 25px rgba(255, 0, 127, 0.2);
      z-index: 1000;
      display: none;
    }

    .player-left {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 30%;
    }

    .player-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--accent-cyan);
      object-fit: cover;
    }

    .player-meta {
      display: flex;
      flex-direction: column;
      text-align: left;
    }

    .player-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-artist {
      font-size: 0.75rem;
      color: var(--accent-cyan);
      font-family: 'Orbitron', sans-serif;
    }

    .player-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: 45%;
    }

    .ctrl-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
      box-shadow: 0 0 8px var(--accent);
    }
    .ctrl-btn:hover { 
      transform: scale(1.1); 
      background: var(--accent-cyan);
      box-shadow: 0 0 12px var(--accent-cyan);
      color: #000;
    }

    .progress-container {
      display: flex;
      align-items: center;
      width: 100%;
      gap: 10px;
      font-size: 0.75rem;
      color: var(--fg-muted);
      font-family: 'Orbitron', sans-serif;
    }

    .progress-bar {
      flex-grow: 1;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }

    .progress-current {
      height: 100%;
      background: var(--accent-cyan);
      width: 0%;
      border-radius: 2px;
      box-shadow: 0 0 8px var(--accent-cyan);
    }

    .player-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      width: 25%;
    }

    .volume-slider {
      width: 80px;
      cursor: pointer;
      accent-color: var(--accent);
    }

    /* 響應式調整 */
    @media (max-width: 500px) {
      .card { padding: 2rem 1.5rem; }
      .avatar-wrapper { width: 100px; height: 100px; }
      h1 { font-size: 1.5rem; }
      .player-left { width: 60%; }
      .player-center { width: 40%; }
      .player-right { display: none; }
    }
  </style>
</head>
<body>

  <!-- 背景層 -->
  <div class="bg-layer">
    <div class="bg-gradient"></div>
    <div class="cyber-grid"></div>
    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-2"></div>
    <div class="particles" id="particles"></div>
  </div>

  <!-- 個人主卡片 -->
  <div class="card">
    <div class="avatar-wrapper">
      <div class="avatar-ring"></div>
      <img src="Avatar.png" class="avatar" alt="Yuki" />
    </div>
    
    <h1>Yuki & 小姐</h1>
    <p class="bio">們大家好～我是Yuki小姐！</p>
    <p class="bio">偶像系～想要專一的你們（不是啦～</p>
    <p class="bio">是港V！</p>
    
    <!-- 🎵 音訊播放專區 -->
    <div class="audio-section-title"><i class="fas fa-bolt"></i> VOICE & MUSIC</div>
    <div class="audio-tracks">
      
      <div class="track-item" data-src="Way_Back_Home.mp3" data-title="Way_Back_Home💕">
        <span class="track-name">Way_Back_Home💕</span>
        <span class="track-play-icon"><i class="fas fa-play"></i></span>
      </div>

      <div class="track-item" data-src="Rosa_Walton_Hallie_Coggins.mp3" data-title="Cyberpunk 2077 Edgerunner">
        <span class="track-name">Cyberpunk 2077 Edgerunner</span>
        <span class="track-play-icon"><i class="fas fa-play"></i></span>
      </div>

    </div>

    <!-- 社群按鈕清單 -->
    <div class="social-links">
      <a href="https://www.facebook.com/profile.php?id=61573278368191" target="_blank" rel="noopener noreferrer" class="btn">
        <i class="fab fa-facebook"></i> Xiaoxue Misa Yuki
      </a>
      
      <a href="https://www.instagram.com/haiyi_0206?igsh=MWhsb2k1cDUweWlybw==" target="_blank" rel="noopener noreferrer" class="btn">
        <i class="fab fa-instagram"></i> haiyi_0206
      </a>
      
      <a href="https://www.youtube.com/@Yuki-%E5%B0%8F%E5%A7%90" target="_blank" rel="noopener noreferrer" class="btn">
        <i class="fab fa-youtube"></i> Yuki_小姐
      </a>
      
      <a href="https://discord.gg/yw2pFFDW7j" target="_blank" rel="noopener noreferrer" class="btn">
        <i class="fab fa-discord"></i> 開心玩遊戲群組
      </a>
    </div>

    <div class="footer">
      // SYSTEM_OVERRIDE_2026
    </div>
  </div>

  <audio id="main-audio" preload="metadata"></audio>

  <!-- 底部固定全域播放控制列 -->
  <div class="audio-player-bar" id="player-bar">
    <div class="player-left">
      <img src="Avatar.png" alt="Mini Avatar" class="player-avatar">
      <div class="player-meta">
        <span class="player-title" id="bar-title">未選取曲目</span>
        <span class="player-artist">Yuki & 小姐</span>
      </div>
    </div>

    <div class="player-center">
      <button class="ctrl-btn" id="bar-play-toggle"><i class="fas fa-play"></i></button>
      <div class="progress-container">
        <span id="time-current">00:00</span>
        <div class="progress-bar" id="bar-progress-bg">
          <div class="progress-current" id="bar-progress-fill"></div>
        </div>
        <span id="time-total">00:00</span>
      </div>
    </div>

    <div class="player-right">
      <i class="fas fa-volume-up" style="color: var(--accent-cyan);"></i>
      <input type="range" class="volume-slider" id="volume-range" min="0" max="1" step="0.05" value="0.8">
    </div>
  </div>

  <script>
    // 1. 創建數位粒子特效
    const container = document.getElementById('particles');
    if (container) {
      const particleCount = 20;
      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 6 + 's';
        particle.style.animationDuration = (4 + Math.random() * 4) + 's';
        container.appendChild(particle);
      }
    }

    // 2. 音訊播放核心邏輯
    const audio = document.getElementById('main-audio');
    const playerBar = document.getElementById('player-bar');
    const trackItems = document.querySelectorAll('.track-item');
    
    const barTitle = document.getElementById('bar-title');
    const barPlayToggle = document.getElementById('bar-play-toggle');
    const progressBg = document.getElementById('bar-progress-bg');
    const progressFill = document.getElementById('bar-progress-fill');
    const timeCurrent = document.getElementById('time-current');
    const timeTotal = document.getElementById('time-total');
    const volumeRange = document.getElementById('volume-range');

    let currentTrackItem = null;

    trackItems.forEach(item => {
      item.addEventListener('click', () => {
        const src = item.getAttribute('data-src');
        const title = item.getAttribute('data-title');

        if (currentTrackItem === item) {
          togglePlay();
          return;
        }

        if (currentTrackItem) {
          currentTrackItem.classList.remove('playing');
          currentTrackItem.querySelector('.track-play-icon i').className = 'fas fa-play';
        }

        currentTrackItem = item;
        item.classList.add('playing');
        item.querySelector('.track-play-icon i').className = 'fas fa-pause';

        audio.src = src;
        barTitle.innerText = title;

        playerBar.style.display = 'flex';
        audio.play().catch(err => console.log("播放被阻擋:", err));
        barPlayToggle.innerHTML = '<i class="fas fa-pause"></i>';
      });
    });

    barPlayToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      togglePlay();
    });

    function togglePlay() {
      if (!currentTrackItem) return;

      if (audio.paused) {
        audio.play();
        barPlayToggle.innerHTML = '<i class="fas fa-pause"></i>';
        currentTrackItem.querySelector('.track-play-icon i').className = 'fas fa-pause';
      } else {
        audio.pause();
        barPlayToggle.innerHTML = '<i class="fas fa-play"></i>';
        currentTrackItem.querySelector('.track-play-icon i').className = 'fas fa-play';
      }
    }

    audio.addEventListener('loadedmetadata', () => {
      timeTotal.innerText = formatTime(audio.duration);
    });

    audio.addEventListener('timeupdate', () => {
      if (audio.duration) {
        const percentage = (audio.currentTime / audio.duration) * 100;
        progressFill.style.width = percentage + '%';
        timeCurrent.innerText = formatTime(audio.currentTime);
      }
    });

    audio.addEventListener('ended', () => {
      barPlayToggle.innerHTML = '<i class="fas fa-play"></i>';
      if (currentTrackItem) {
        currentTrackItem.querySelector('.track-play-icon i').className = 'fas fa-play';
      }
      progressFill.style.width = '0%';
      timeCurrent.innerText = '00:00';
    });

    progressBg.addEventListener('click', (e) => {
      if (!audio.src) return;
      const rect = progressBg.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      audio.currentTime = (clickX / rect.width) * audio.duration;
    });

    volumeRange.addEventListener('input', (e) => {
      audio.volume = e.target.value;
    });

    function formatTime(seconds) {
      if (isNaN(seconds)) return "00:00";
      const min = Math.floor(seconds / 60);
      const sec = Math.floor(seconds % 60);
      return `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
    }
  </script>
</body>
</html>
