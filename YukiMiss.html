<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Yuki - 個人頁面</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- 引入黑客風愛用的等寬字型與科技感字體 -->
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Share+Tech+Mono&family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary: ;
      --bg-secondary: ;
      --fg: #e9e9e9f5; /* 經典黑客綠 */
      --fg-muted: #eeeeee;
      --accent: #f3f3f3de;
      --accent-dim: rgb(139, 21, 185);
      --card-bg: rgba(78, 10, 58, 0.096);
      --border: #df128a23;
      --player-bg: rgba(85, 8, 46, 0.493);
    }

    html {
      font-size: 16px;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      padding-bottom: 120px;
      font-family: 'Fira Code', 'Noto Sans TC', monospace;
      /* 修正：將背景圖從 :root 移至 body */
      background: url('Render High Definition GIF by time.gif') no-repeat center/cover fixed;
      background-color: #111; 
      color: var(--fg);
      overflow-x: hidden;
      position: relative;
    }

    /* 畫布背景層（數位雨） */
    #canvas-matrix {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.35; /* 避免干擾文字閱讀 */
    }

    /* 科技感網格覆蓋層 */
    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      background-size: 100% 4px, 6px 100%;
    }

    /* 卡片 */
    .card {
      position: relative;
      z-index: 2;
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 2px solid var(--border);
      border-radius: 12px; /* 改為較硬朗的科技感微圓角 */
      padding: 2.5rem 2rem;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 20px rgba(79, 4, 102, 0.2), inset 0 0 15px rgba(181, 6, 224, 0.1);
      animation: card-entrance 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(20px);
      margin-bottom: 20px;
    }

    @keyframes card-entrance { to { opacity: 1; transform: translateY(0); } }

    /* 頭像外框改為雷達/目標鎖定風格 */
    .avatar-wrapper {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto 1.5rem;
    }

    .avatar-ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px dashed var(--accent);
      animation: ring-rotate 15s linear infinite;
    }

    @keyframes ring-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .avatar {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #000;
      filter: grayscale(20%) sepia(10%) hue-rotate(85deg); /* 帶有綠色矩陣濾鏡感 */
      transition: all 0.3s ease;
      z-index: 1;
    }
    .avatar:hover { 
      transform: scale(1.05); 
      filter: grayscale(0%);
      box-shadow: 0 0 15px var(--accent);
    }

    /* 分享選單樣式 */
    .share-float {
      position: fixed;
      bottom: 118px;
      right: 30px;
      z-index: 2000;
      width: 55px;
      height: 55px;
      background: rgba(0, 0, 0, 0);
      border: 2px solid var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.541);
      transition: all 0.3s ease;
    }

    .share-float:hover {
      transform: scale(1.1) rotate(20deg);
    }

    .share-menu {
      position: fixed;
      bottom: 158px;
      right: 95px;
      background: rgba(214, 121, 44, 0.068);
      backdrop-filter: blur(12px);
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 15px;
      width: 220px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.548);
      display: none;
      flex-direction: column;
      gap: 6px;
      z-index: 2001;
    }

    .share-menu.show { display: flex; animation: menuPop 0.3s ease; }

    @keyframes menuPop {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .share-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      color: var(--fg);
      text-decoration: none;
      border-radius: 6px;
      transition: 0.2s;
    }

    .share-item:hover {
      background: rgba(0, 0, 0, 0.397);
    }

    /* 文字與光標閃爍 */
    h1 {
      font-family: 'Share Tech Mono', sans-serif;
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 0.8rem;
      letter-spacing: 0.05em;
      color: #fff;
      text-shadow: 0 0 8px var(--accent);
    }

    .bio {
      color: var(--fg-muted);
      font-size: 0.9rem;
      font-weight: 400;
      line-height: 1.6;
      margin-bottom: 0.4rem;
      text-align: left;
    }
    
    /* 終端閃爍光標模擬 */
    .bio::after {
      content: "_";
      animation: blink 1s infinite;
    }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

    /* 音訊專區標題 */
    .audio-section-title {
      font-family: 'Share Tech Mono', sans-serif;
      font-size: 1rem;
      color: var(--fg);
      margin: 1.5rem 0 0.75rem;
      text-align: left;
      font-weight: 600;
      border-left: 4px solid var(--accent);
      padding-left: 8px;
      letter-spacing: 0.1em;
      text-shadow: 0 0 5px var(--accent-dim);
    }

    /* 音軌清單 */
    .audio-tracks {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .track-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(197, 7, 204, 0.171);
      border: 1px solid rgba(118, 7, 122, 0.219);
      padding: 0.7rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
    }
    .track-item:hover {
      background: rgba(153, 0, 255, 0.12);
      border-color: var(--accent);
      box-shadow: 0 0 8px rgba(225, 0, 255, 0.2);
    }
    .track-item.playing {
      background: rgba(202, 2, 142, 0.2);
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(255, 0, 128, 0.3);
    }
    .track-name {
      font-size: 0.85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 210px;
    }
    .track-play-icon {
      color: var(--accent);
      font-size: 0.85rem;
    }

    /* 社交連結按鈕：改為代碼終端風格 */
    .social-links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 1rem;
      padding: 0.8rem 1.25rem;
      border-radius: 4px;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--fg);
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(231, 10, 146, 0.4);
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateX(-10px);
      animation: btn-entrance 0.4s ease-out forwards;
    }

    .btn:nth-child(1) { animation-delay: 0.2s; }
    .btn:nth-child(2) { animation-delay: 0.3s; }
    .btn:nth-child(3) { animation-delay: 0.4s; }
    .btn:nth-child(4) { animation-delay: 0.5s; }

    @keyframes btn-entrance { to { opacity: 1; transform: translateX(0); } }

    /* 按鈕懸停霓虹掃描線特效 */
    .btn:hover {
      background: rgba(133, 5, 133, 0.15);
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(230, 86, 187, 0.233);
      color: #ffffff;
      transform: scale(1.02);
    }
    .btn:active { transform: scale(0.98); }
    .btn i { font-size: 1.1rem; width: 20px; text-align: center; }

    /* 頁尾 */
    .footer {
      margin-top: 25px;
      font-size: 11px;
      font-family: 'Share Tech Mono', monospace;
      color: var(--fg-muted);
      opacity: 0.5;
      letter-spacing: 0.05em;
    }

    /* ===== 底部全域音樂播放列（賽博終端黑） ===== */
    .audio-player-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--player-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 2px solid var(--accent);
      padding: 15px 25px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 -5px 25px rgba(241, 60, 166, 0.514);
      z-index: 1000;
      display: none;
    }

    .player-left {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 30%;
    }

    .player-avatar {
      width: 40px;
      height: 40px;
      border-radius: 4px;
      border: 1px solid var(--accent);
      object-fit: cover;
    }

    .player-meta {
      display: flex;
      flex-direction: column;
      text-align: left;
      overflow: hidden;
    }

    .player-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-artist {
      font-size: 0.75rem;
      color: var(--fg-muted);
      font-family: 'Share Tech Mono', monospace;
    }

    .player-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: 45%;
    }

    .ctrl-btn {
      background: var(--accent);
      border: none;
      color: #000;
      width: 36px;
      height: 36px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .ctrl-btn:hover { 
      transform: scale(1.05); 
      box-shadow: 0 0 10px var(--accent);
    }

    .progress-container {
      display: flex;
      align-items: center;
      width: 100%;
      gap: 10px;
      font-size: 0.75rem;
      font-family: 'Share Tech Mono', monospace;
      color: var(--fg-muted);
    }

    .progress-bar {
      flex-grow: 1;
      height: 4px;
      background: rgba(160, 13, 103, 0.15);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }

    .progress-current {
      height: 100%;
      background: var(--accent);
      width: 0%;
      border-radius: 2px;
      box-shadow: 0 0 8px var(--accent);
    }

    .player-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      width: 25%;
      font-size: 0.8rem;
    }

    .volume-slider {
      width: 80px;
      cursor: pointer;
      accent-color: var(--accent);
    }

    /* 響應式 */
    @media (max-width: 500px) {
      .card { padding: 2rem 1.25rem; }
      .avatar-wrapper { width: 100px; height: 100px; }
      h1 { font-size: 1.5rem; }
      .bio { font-size: 0.85rem; }
      .player-left { width: 60%; }
      .player-center { width: 40%; }
      .player-right { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      #canvas-matrix { display: none; }
    }
  </style>
</head>

  <!-- JavaScript 控制邏輯 -->
  <script>
    // 1. 經典 Matrix 綠色數位雨特效
    const canvas = document.getElementById('canvas-matrix');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // 黑客代碼字元集
    const katakana = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789ｦｧｨｩｪｫｬｭｮｯｰｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ';
    const alphabet = katakana.split('');

    const fontSize = 16;
    let columns = canvas.width / fontSize;

    let rainDrops = [];
    function initRain() {
      columns = canvas.width / fontSize;
      rainDrops = [];
      for (let x = 0; x < columns; x++) {
        rainDrops[x] = 1;
      }
    }
    initRain();
    window.addEventListener('resize', initRain);

    function drawMatrix() {
      // 透過微透明的黑色刷淡上一幀，形成拖尾（尾巴）效果
      ctx.fillStyle = 'rgba(5, 5, 5, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#f33bdb'; // 設定代碼雨顏色
      ctx.font = fontSize + 'px monospace';

      for (let i = 0; i < rainDrops.length; i++) {
        const text = alphabet[Math.floor(Math.random() * alphabet.length)];
        ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

        if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          rainDrops[i] = 0;
        }
        rainDrops[i]++;
      }
    }
    setInterval(drawMatrix, 30);


    // 2. 音訊播放核心邏輯 (繼承原始封裝)
    const audio = document.getElementById('main-audio');
    const playerBar = document.getElementById('player-bar');
    const trackItems = document.querySelectorAll('.track-item');
    
    const barTitle = document.getElementById('bar-title');
    const barPlayToggle = document.getElementById('bar-play-toggle');
    const progressBg = document.getElementById('bar-progress-bg');
    const progressFill = document.getElementById('bar-progress-fill');
    const timeCurrent = document.getElementById('time-current');
    const timeTotal = document.getElementById('time-total');
    const volumeRange = document.getElementById('volume-range');

    let currentTrackItem = null;

    trackItems.forEach(item => {
      item.addEventListener('click', () => {
        const src = item.getAttribute('data-src');
        const title = item.getAttribute('data-title');

        if (currentTrackItem === item) {
          togglePlay();
          return;
        }

        if (currentTrackItem) {
          currentTrackItem.classList.remove('playing');
          currentTrackItem.querySelector('.track-play-icon i').className = 'fas fa-play';
        }

        currentTrackItem = item;
        item.classList.add('playing');
        item.querySelector('.track-play-icon i').className = 'fas fa-pause';

        audio.src = src;
        barTitle.innerText = title;

        playerBar.style.display = 'flex';
        audio.play().catch(err => console.log("播放被阻擋，請與頁面互動:", err));
        barPlayToggle.innerHTML = '<i class="fas fa-pause"></i>';
      });
    });

    barPlayToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      togglePlay();
    });

    function togglePlay() {
      if (!currentTrackItem) return;

      if (audio.paused) {
        audio.play();
        barPlayToggle.innerHTML = '<i class="fas fa-pause"></i>';
        currentTrackItem.querySelector('.track-play-icon i').className = 'fas fa-pause';
      } else {
        audio.pause();
        barPlayToggle.innerHTML = '<i class="fas fa-play"></i>';
        currentTrackItem.querySelector('.track-play-icon i').className = 'fas fa-play';
      }
    }

    audio.addEventListener('loadedmetadata', () => {
      timeTotal.innerText = formatTime(audio.duration);
    });

    audio.addEventListener('timeupdate', () => {
      if (audio.duration) {
        const percentage = (audio.currentTime / audio.duration) * 100;
        progressFill.style.width = percentage + '%';
        timeCurrent.innerText = formatTime(audio.currentTime);
      }
    });

    audio.addEventListener('ended', () => {
      barPlayToggle.innerHTML = '<i class="fas fa-play"></i>';
      if (currentTrackItem) {
        currentTrackItem.querySelector('.track-play-icon i').className = 'fas fa-play';
      }
      progressFill.style.width = '0%';
      timeCurrent.innerText = '00:00';
    });

    progressBg.addEventListener('click', (e) => {
      if (!audio.src) return;
      const rect = progressBg.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      audio.currentTime = (clickX / rect.width) * audio.duration;
    });

    volumeRange.addEventListener('input', (e) => {
      audio.volume = e.target.value;
    });

    function formatTime(seconds) {
      if (isNaN(seconds)) return "00:00";
      const min = Math.floor(seconds / 60);
      const sec = Math.floor(seconds % 60);
      return `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
    }

    <!-- ==================== 社群分享功能 ==================== -->
    const shareBtn = document.getElementById('share-btn');
    const shareMenu = document.getElementById('share-menu');
    const pageTitle = document.title;
    const pageUrl = window.location.href;

    shareBtn.addEventListener('click', () => shareMenu.classList.toggle('show'));

    document.addEventListener('click', (e) => {
      if (!shareBtn.contains(e.target) && !shareMenu.contains(e.target)) {
        shareMenu.classList.remove('show');
      }
    });

    function shareTo(platform) {
      const encodedTitle = encodeURIComponent(pageTitle);
      const encodedUrl = encodeURIComponent(pageUrl);
      let url = '';

      switch(platform) {
        case 'facebook': url = `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}`; break;
        case 'twitter': url = `https://twitter.com/intent/tweet?text=${encodedTitle}&url=${encodedUrl}`; break;
        case 'line': url = `https://social-plugins.line.me/lineit/share?url=${encodedUrl}`; break;
        case 'bluesky': url = `https://bsky.app/intent/compose?text=${encodedTitle}%20${encodedUrl}`; break;
        case 'threads': url = `https://threads.net/intent/post?text=${encodedTitle}%20${encodedUrl}`; break;
        case 'whatsapp': url = `https://wa.me/?text=${encodedTitle}%20${encodedUrl}`; break;
      }
      if (url) window.open(url, '_blank');
    }

    document.querySelectorAll('.share-item[data-platform]').forEach(item => {
      item.addEventListener('click', (e) => {
        e.preventDefault();
        shareTo(item.dataset.platform);
        shareMenu.classList.remove('show');
      });
    });

    document.getElementById('copy-link').addEventListener('click', (e) => {
      e.preventDefault();
      navigator.clipboard.writeText(pageUrl).then(() => {
        const original = e.target.innerHTML;
        e.target.innerHTML = '<i class="fas fa-check"></i> 已複製！';
        setTimeout(() => e.target.innerHTML = original, 2000);
      });
      shareMenu.classList.remove('show');
    });
  </script>
</body>
</html>
